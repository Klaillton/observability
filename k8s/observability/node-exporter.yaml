# DaemonSet: garante exatamente um pod por node do cluster.
# Ideal para coleta de metricas de host — cada no precisa do seu proprio agente.
# Em clusters multi-node, cada node teria seu proprio node-exporter automaticamente.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: observability
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      # Tolerations permitem que o DaemonSet rode em nodes com taints de control-plane.
      # Necessario em clusters onde o control-plane nao aceita workloads comuns.
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-exporter
          # node-exporter coleta metricas do sistema operacional host:
          # CPU, memoria, disco, rede, filesystem, network sockets, etc.
          image: prom/node-exporter:v1.8.2
          args:
            # Aponta para o /proc e /sys do HOST montados abaixo,
            # nao do container — assim as metricas sao do servidor real.
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            # Exclui filesystems virtuais para evitar ruido nas metricas de disco.
            # $$ = escape do $ no YAML (seria interpretado como variavel de shell).
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/k3s)($$|/)
          ports:
            - containerPort: 9100
              name: http
          securityContext:
            # Executa como usuario nobody (65534) — sem privilegios de root.
            runAsNonRoot: true
            runAsUser: 65534
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 30Mi
            limits:
              cpu: 200m
              memory: 100Mi
          volumeMounts:
            # Monta /proc do host em modo readonly para coletar metricas de CPU,
            # memoria, processos, sockets de rede, etc.
            - name: proc
              mountPath: /host/proc
              readOnly: true
            # Monta /sys do host para metricas de hardware e kernel.
            - name: sys
              mountPath: /host/sys
              readOnly: true
            # Monta / (raiz) do host para calcular uso de filesystem corretamente.
            # mountPropagation: HostToContainer propaga novos mounts do host para o container.
            - name: root
              mountPath: /host/root
              readOnly: true
              mountPropagation: HostToContainer
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
---
# Service ClusterIP: permite ao Prometheus dentro do cluster
# fazer scrape do node-exporter pelo hostname "node-exporter:9100".
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: observability
  labels:
    app: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - name: http
      port: 9100
      targetPort: http

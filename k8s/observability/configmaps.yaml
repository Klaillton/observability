# ============================================================================
# ConfigMaps da stack observability
# ============================================================================
# Este arquivo centraliza configuracoes dos componentes para facilitar operacao.
# Cada bloco em data.<arquivo> replica configuracoes equivalentes do ambiente
# Docker Compose, adaptadas para Kubernetes.

apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
data:
  # Arquivo montado em /etc/loki/config.yaml no pod do Loki.
  config.yaml: |
    # Loki em modo simplificado para ambiente local.
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          # in-memory suficiente para instancia unica.
          store: inmemory

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      # Limites evitam picos de ingestao em ambientes pequenos.
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: observability
data:
  # Arquivo montado em /etc/tempo/tempo.yaml no pod do Tempo.
  tempo.yaml: |
    # Tempo recebe spans OTLP e persiste em disco local.
    server:
      http_listen_port: 3200
      log_level: info

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo
        wal:
          # WAL melhora recuperacao apos falhas abruptas.
          path: /var/tempo/wal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  # Arquivo montado em /etc/prometheus/prometheus.yml no pod do Prometheus.
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      # Coleta de saude do proprio Prometheus.
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Coleta metrics publicadas pelo OTel Collector.
      # Porta 8889: metricas de aplicacao exportadas via OTel Prometheus exporter.
      - job_name: otel-collector-metrics
        static_configs:
          - targets: ['otel-collector:8889']

      # Porta 8888: metricas internas do proprio OTel Collector
      # (spans recebidos, exportados, falhas, tamanho de fila, etc.).
      - job_name: otel-collector-internal
        static_configs:
          - targets: ['otel-collector:8888']

      # node-exporter: metricas do sistema operacional host
      # (CPU, memoria, disco, rede, load average, filesystem).
      - job_name: node-exporter
        static_configs:
          - targets: ['node-exporter:9100']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  # Arquivo montado em /etc/otelcol/config.yaml no pod do Collector.
  config.yaml: |
    # Pipeline de telemetria unificada.
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # Batch reduz overhead de exportacao.
      batch:

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp_grpc/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      otlp_http/loki:
        endpoint: http://loki:3100/otlp

    service:
      # Habilita metricas internas do Collector na porta 8888 para scrape pelo Prometheus.
      # Expoe spans/metrics/logs recebidos, exportados, filas, etc.
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        # Roteamento por tipo de sinal.
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp_grpc/tempo]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp_http/loki]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  # Provisioning automatico de datasources do Grafana.
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: false
        editable: true

      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
        isDefault: false
        editable: true
        jsonData:
          # Correlacao trace -> logs usando Loki.
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: -1m
            spanEndTimeShift: 1m
          # Service map baseado em metricas do Prometheus.
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        isDefault: true
        editable: true
        jsonData:
          derivedFields:
            # Extrai traceId do log para abrir trace no Tempo.
            - datasourceUid: tempo
              matcherRegex: '"traceId":"(\w+)"'
              name: TraceID
              url: '${__value.raw}'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: observability
data:
  # Provisioning de dashboards por arquivo.
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: observability-dashboards
        orgId: 1
        # Pasta logica exibida na UI do Grafana.
        folder: Observability
        type: file
        disableDeletion: false
        editable: true
        # Rele leitura periodica de arquivos sem restart do pod.
        updateIntervalSeconds: 30
        options:
          # Path montado pelo ConfigMap com JSONs de dashboard.
          path: /etc/grafana/dashboards

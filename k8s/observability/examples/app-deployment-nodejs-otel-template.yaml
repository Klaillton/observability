apiVersion: apps/v1
kind: Deployment
metadata:
  name: minha-app-node
  namespace: apps
  labels:
    app: minha-app-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minha-app-node
  template:
    metadata:
      labels:
        app: minha-app-node
    spec:
      containers:
        - name: minha-app-node
          image: ghcr.io/org/minha-app-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            # Identidade do servico no OpenTelemetry.
            - name: OTEL_SERVICE_NAME
              value: minha-app-node
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=apps,service.version=1.0.0,deployment.environment=dev

            # Endpoint OTLP para envio de traces/metrics/logs.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf

            # Sinais habilitados.
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp

            # Exemplo para bootstrap automatico do SDK em Node.js.
            # Ajuste o caminho conforme sua imagem.
            - name: NODE_OPTIONS
              value: --require ./instrumentation/otel-auto.js
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: minha-app-node
  namespace: apps
  labels:
    app: minha-app-node
spec:
  selector:
    app: minha-app-node
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP

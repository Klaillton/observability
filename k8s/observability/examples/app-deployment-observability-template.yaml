apiVersion: apps/v1
kind: Deployment
metadata:
  name: minha-app
  namespace: apps
  labels:
    app: minha-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minha-app
  template:
    metadata:
      labels:
        app: minha-app
    spec:
      containers:
        - name: minha-app
          image: ghcr.io/org/minha-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Identidade basica da aplicacao no ecossistema de observabilidade.
            - name: OTEL_SERVICE_NAME
              value: minha-app
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=apps,service.version=1.0.0,deployment.environment=dev

            # Exportacao OTLP para o OTel Collector da stack observability.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf

            # Sinais habilitados. Ajuste conforme necessidade da aplicacao.
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: minha-app
  namespace: apps
  labels:
    app: minha-app
spec:
  selector:
    app: minha-app
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP

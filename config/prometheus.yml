global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector-metrics'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'brewer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['brewer-app:8080']

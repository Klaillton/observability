# ============================================================================
# Grafana Datasources - Provisioning
# ============================================================================
# Provisioning permite que o Grafana suba ja configurado,
# sem ajuste manual na UI a cada ambiente.

apiVersion: 1

datasources:
  # Fonte de metrics (PromQL).
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true

  # Fonte de traces (exploracao de spans e grafos de servicos).
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      # Habilita correlacao trace -> logs.
      # Janela de tempo evita perder logs proximos ao span.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
      # Usa Prometheus para mapa de servicos.
      serviceMap:
        datasourceUid: prometheus
      # Visualizacao de dependencias entre spans.
      nodeGraph:
        enabled: true

  # Fonte de logs (LogQL).
  # Definida como default para facilitar exploracao inicial no Explore.
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      # Campo derivado para extrair traceId do log e criar link para Tempo.
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceId":"(\w+)"'
          name: TraceID
          url: "${__value.raw}"

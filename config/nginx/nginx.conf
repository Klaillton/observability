# ============================================================================
# Nginx - Reverse Proxy com TLS para a stack de observabilidade
# ============================================================================
# Responsabilidades:
#   - Terminar TLS (HTTPS) em nome dos servicos internos
#   - Redirecionar HTTP (80) para HTTPS (443)
#   - Fazer proxy das UIs: Grafana (/) e Prometheus (/prometheus/)
# Certificado: self-signed gerado localmente em config/nginx/certs/

events {
  worker_connections 1024;
}

http {
  # -------------------------------------------------------------------------
  # Redirecionar todo HTTP para HTTPS
  # -------------------------------------------------------------------------
  server {
    listen 80;
    server_name localhost;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # -------------------------------------------------------------------------
  # HTTPS - Grafana (UI principal de observabilidade)
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Protocolos e cifras modernos; desativa SSLv3/TLSv1.0/TLSv1.1
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Seguranca adicional de cabecalhos
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # ------------------------------------------------------------------
    # Grafana — raiz do site
    # ------------------------------------------------------------------
    location / {
      proxy_pass         http://grafana:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Suporte a WebSockets (necessario para live streaming do Grafana)
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }

    # ------------------------------------------------------------------
    # Prometheus — acessivel em /prometheus/
    # ------------------------------------------------------------------
    location /prometheus/ {
      proxy_pass         http://prometheus:9090/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}

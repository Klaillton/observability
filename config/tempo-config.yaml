# ============================================================================
# Tempo - Configuracao
# ============================================================================
# Tempo armazena traces distribuidos (spans) de forma otimizada.
# Ele complementa metrics (Prometheus) e logs (Loki).

server:
  # API HTTP para health checks e consultas via Grafana.
  http_listen_port: 3200
  log_level: info

distributor:
  # Camada de entrada de spans.
  receivers:
    otlp:
      protocols:
        # OTLP gRPC: caminho mais comum para instrumentacao moderna.
        grpc:
          endpoint: 0.0.0.0:4317
        # OTLP HTTP: alternativa quando gRPC nao esta disponivel.
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    # backend local em filesystem, adequado para lab/dev.
    backend: local
    local:
      # Diretoria exclusiva para blocos compactados de traces.
      # Nao deve incluir o subdiretorio do WAL para evitar que o poller
      # trate `wal` como se fosse tenant de blocos.
      path: /var/tempo/traces
    wal:
      # WAL (write-ahead log) melhora resiliencia em falhas.
      path: /var/tempo/wal
